<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتبة الآيات القرآنية | استماع وتحميل</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a1f1a;
            font-family: 'Cairo', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #e2e8f0;
            padding: 15px;
        }
        .container {
            max-width: 950px;
            width: 100%;
            background: #0b2b24;
            border-radius: 32px;
            padding: 25px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.7), 0 0 0 1px rgba(0,255,128,0.3);
        }
        .header {
            text-align: center;
            margin-bottom: 25px;
        }
        .header h1 {
            font-size: 2.2rem;
            font-weight: 900;
            color: #fbbf24;
            text-shadow: 0 0 15px #f59e0b;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-family: 'Amiri', 'Cairo', serif;
        }
        .search-panel {
            background: #0d3329;
            border-radius: 24px;
            padding: 20px;
            border: 1px solid #1f5c45;
            margin-bottom: 20px;
        }
        .row {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: flex-end;
            margin-bottom: 15px;
        }
        .input-group {
            flex: 1;
            min-width: 150px;
        }
        .input-group label {
            display: block;
            font-weight: 600;
            font-size: 0.85rem;
            color: #a7c5b8;
            margin-bottom: 6px;
        }
        .input-group input,
        .input-group select {
            width: 100%;
            padding: 10px 14px;
            border-radius: 12px;
            border: 1px solid #2d5a44;
            background: #1a3d30;
            color: #fff;
            font-size: 0.95rem;
            font-family: 'Cairo', sans-serif;
            outline: none;
        }
        .input-group input:focus,
        .input-group select:focus {
            border-color: #4ade80;
            box-shadow: 0 0 0 2px rgba(74,222,128,0.3);
        }
        .btn {
            background: #22c55e;
            color: #052e16;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Cairo', sans-serif;
            white-space: nowrap;
        }
        .btn:hover { background: #16a34a; box-shadow: 0 0 20px #22c55e; }
        .btn-gold {
            background: #f59e0b;
            color: #0a1f1a;
        }
        .btn-gold:hover { background: #d97706; box-shadow: 0 0 20px #f59e0b; }
        .btn-outline {
            background: transparent;
            border: 2px solid #fbbf24;
            color: #fbbf24;
        }
        .btn-outline:hover { background: #fbbf24; color: #0a1f1a; }
        .ayah-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .ayah-item {
            background: #0a2a1f;
            border-radius: 16px;
            padding: 16px;
            border: 1px solid #255a40;
            transition: 0.3s;
        }
        .ayah-item:hover { border-color: #4ade80; }
        .ayah-text {
            font-family: 'Amiri', 'Traditional Arabic', serif;
            font-size: 1.6rem;
            line-height: 2.2;
            color: #f1f5f9;
            text-align: center;
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        .ayah-audio {
            width: 100%;
            margin: 8px 0;
            accent-color: #22c55e;
            height: 36px;
        }
        .ayah-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .status-msg {
            text-align: center;
            margin: 12px 0;
            color: #86efac;
        }
        .note {
            font-size: 0.8rem;
            color: #9cb4a5;
            margin-top: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-quran"></i> آيات بينات</h1>
            <p style="color:#a7c5b8;">اختر السورة والآيات والقارئ ثم استمع أو حملها</p>
        </div>

        <div class="search-panel">
            <div class="row">
                <div class="input-group">
                    <label><i class="fas fa-book"></i> رقم السورة</label>
                    <input type="number" id="surahNum" value="1" min="1" max="114">
                </div>
                <div class="input-group">
                    <label><i class="fas fa-list-ol"></i> أرقام الآيات</label>
                    <input type="text" id="ayahNumbers" value="1" placeholder="مثال: 1,3,5-7">
                </div>
                <div class="input-group">
                    <label><i class="fas fa-microphone"></i> القارئ</label>
                    <select id="reciter">
                        <option value="ar.alafasy" selected>مشاري العفاسي</option>
                        <option value="ar.abdulbasit">عبد الباسط عبد الصمد</option>
                        <option value="ar.sudais">عبد الرحمن السديس</option>
                        <option value="ar.ahmedajmi">أحمد العجمي</option>
                        <option value="ar.hudhaify">علي الحذيفي</option>
                        <option value="ar.maher">ماهر المعيقلي</option>
                        <option value="ar.muhammadjibril">محمد جبريل</option>
                        <option value="ar.yasser">ياسر الدوسري</option>
                    </select>
                </div>
            </div>
            <button class="btn" id="fetchBtn"><i class="fas fa-search"></i> جلب الآيات</button>
            <div class="note">
                <i class="fas fa-info-circle"></i> القارئ الموريتاني محمد لقظف غير متوفر في المصدر الحالي. يمكنك اختيار أي قارئ آخر.
            </div>
        </div>

        <div id="ayahContainer" class="ayah-list"></div>
        <div id="globalStatus" class="status-msg"></div>
        <div style="text-align:center; margin-top:15px;">
            <button class="btn btn-gold" id="downloadZipBtn" style="display:none;"><i class="fas fa-file-archive"></i> تحميل الكل كـ ZIP</button>
        </div>
    </div>

    <script>
        (() => {
            const surahNum = document.getElementById('surahNum');
            const ayahNumbers = document.getElementById('ayahNumbers');
            const reciterSelect = document.getElementById('reciter');
            const fetchBtn = document.getElementById('fetchBtn');
            const container = document.getElementById('ayahContainer');
            const globalStatus = document.getElementById('globalStatus');
            const downloadZipBtn = document.getElementById('downloadZipBtn');

            let currentAyahs = []; // { number, text, audio }

            function parseNumbers(str) {
                const nums = new Set();
                const parts = str.split(/[,،]+/);
                for (let part of parts) {
                    part = part.trim();
                    if (part.includes('-')) {
                        const [s, e] = part.split('-');
                        const start = parseInt(s);
                        const end = parseInt(e);
                        if (!isNaN(start) && !isNaN(end) && start <= end) {
                            for (let i = start; i <= end; i++) nums.add(i);
                        }
                    } else {
                        const n = parseInt(part);
                        if (!isNaN(n)) nums.add(n);
                    }
                }
                return Array.from(nums).sort((a,b) => a-b);
            }

            async function fetchSurah(surah, reciter) {
                const url = `https://api.alquran.cloud/v1/surah/${surah}/${reciter}`;
                const res = await fetch(url);
                if (!res.ok) throw new Error('تعذر جلب السورة');
                const data = await res.json();
                if (data.code !== 200) throw new Error('بيانات غير صالحة');
                return data.data.ayahs;
            }

            function renderAyahs(ayahs) {
                container.innerHTML = '';
                currentAyahs = ayahs;
                if (ayahs.length === 0) {
                    container.innerHTML = '<p style="text-align:center;color:#fbbf24;">لا توجد آيات لعرضها</p>';
                    downloadZipBtn.style.display = 'none';
                    return;
                }
                ayahs.forEach((ayah, idx) => {
                    const div = document.createElement('div');
                    div.className = 'ayah-item';
                    div.innerHTML = `
                        <div class="ayah-text">﴿${ayah.text}﴾ <span style="font-size:0.8rem;color:#fbbf24;">[${ayah.number}]</span></div>
                        <audio class="ayah-audio" src="${ayah.audio}" controls preload="none"></audio>
                        <div class="ayah-actions">
                            <button class="btn btn-outline download-single" data-url="${ayah.audio}" data-filename="آية_${ayah.number}.mp3">
                                <i class="fas fa-download"></i> تحميل هذه الآية
                            </button>
                        </div>
                    `;
                    container.appendChild(div);
                });
                downloadZipBtn.style.display = 'inline-flex';
                attachDownloadListeners();
            }

            function attachDownloadListeners() {
                document.querySelectorAll('.download-single').forEach(btn => {
                    btn.addEventListener('click', async (e) => {
                        const url = btn.dataset.url;
                        const filename = btn.dataset.filename;
                        globalStatus.textContent = 'جاري تحميل الآية...';
                        try {
                            await downloadFile(url, filename);
                            globalStatus.textContent = 'تم تحميل الآية بنجاح';
                        } catch (err) {
                            globalStatus.textContent = 'فشل التحميل: ' + err.message;
                        }
                    });
                });
            }

            async function downloadFile(url, filename) {
                const response = await fetch(url);
                const blob = await response.blob();
                const blobUrl = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = blobUrl;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(blobUrl);
            }

            async function downloadAllAsZip() {
                if (currentAyahs.length === 0) return;
                globalStatus.textContent = 'جاري تجهيز ملف ZIP...';
                downloadZipBtn.disabled = true;
                try {
                    const zip = new JSZip();
                    const promises = currentAyahs.map(async (ayah) => {
                        const res = await fetch(ayah.audio);
                        const blob = await res.blob();
                        zip.file(`آية_${ayah.number}.mp3`, blob);
                    });
                    await Promise.all(promises);
                    const content = await zip.generateAsync({ type: 'blob' });
                    const url = URL.createObjectURL(content);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `آيات_سورة_${surahNum.value}.zip`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                    globalStatus.textContent = 'تم تحميل ملف ZIP بنجاح';
                } catch (err) {
                    globalStatus.textContent = 'فشل إنشاء ZIP: ' + err.message;
                } finally {
                    downloadZipBtn.disabled = false;
                }
            }

            fetchBtn.addEventListener('click', async () => {
                const surah = parseInt(surahNum.value);
                const reciter = reciterSelect.value;
                const numbers = parseNumbers(ayahNumbers.value);
                if (!surah || surah < 1 || surah > 114) {
                    alert('رقم السورة غير صحيح');
                    return;
                }
                if (numbers.length === 0) {
                    alert('أدخل أرقام آيات صحيحة');
                    return;
                }
                globalStatus.textContent = 'جاري تحميل السورة...';
                container.innerHTML = '';
                downloadZipBtn.style.display = 'none';
                try {
                    const allAyahs = await fetchSurah(surah, reciter);
                    const selected = allAyahs.filter(a => numbers.includes(a.numberInSurah));
                    if (selected.length === 0) {
                        globalStatus.textContent = 'لم يتم العثور على الآيات المطلوبة';
                        return;
                    }
                    const formatted = selected.map(a => ({
                        number: a.numberInSurah,
                        text: a.text,
                        audio: a.audio
                    }));
                    renderAyahs(formatted);
                    globalStatus.textContent = `تم جلب ${formatted.length} آيات`;
                } catch (err) {
                    globalStatus.textContent = 'خطأ: ' + err.message;
                }
            });

            downloadZipBtn.addEventListener('click', downloadAllAsZip);

            // تحميل افتراضي
            window.addEventListener('load', () => {
                fetchBtn.click();
            });
        })();
    </script>
</body>
</html>
