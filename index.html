<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتبة الآيات القرآنية | دمج وتحميل صوتي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a1f1a;
            font-family: 'Cairo', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #e2e8f0;
            padding: 15px;
        }
        .container {
            max-width: 950px;
            width: 100%;
            background: #0b2b24;
            border-radius: 32px;
            padding: 25px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.7), 0 0 0 1px rgba(0,255,128,0.3);
        }
        .header {
            text-align: center;
            margin-bottom: 25px;
        }
        .header h1 {
            font-size: 2.2rem;
            font-weight: 900;
            color: #fbbf24;
            text-shadow: 0 0 15px #f59e0b;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-family: 'Amiri', 'Cairo', serif;
        }
        .search-panel {
            background: #0d3329;
            border-radius: 24px;
            padding: 20px;
            border: 1px solid #1f5c45;
            margin-bottom: 20px;
        }
        .row {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: flex-end;
            margin-bottom: 15px;
        }
        .input-group {
            flex: 1;
            min-width: 150px;
        }
        .input-group label {
            display: block;
            font-weight: 600;
            font-size: 0.85rem;
            color: #a7c5b8;
            margin-bottom: 6px;
        }
        .input-group input,
        .input-group select {
            width: 100%;
            padding: 10px 14px;
            border-radius: 12px;
            border: 1px solid #2d5a44;
            background: #1a3d30;
            color: #fff;
            font-size: 0.95rem;
            font-family: 'Cairo', sans-serif;
            outline: none;
        }
        .input-group input:focus,
        .input-group select:focus {
            border-color: #4ade80;
            box-shadow: 0 0 0 2px rgba(74,222,128,0.3);
        }
        .btn {
            background: #22c55e;
            color: #052e16;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: 'Cairo', sans-serif;
            white-space: nowrap;
        }
        .btn:hover { background: #16a34a; box-shadow: 0 0 20px #22c55e; }
        .btn-gold { background: #f59e0b; color: #0a1f1a; }
        .btn-gold:hover { background: #d97706; box-shadow: 0 0 20px #f59e0b; }
        .btn-outline {
            background: transparent;
            border: 2px solid #fbbf24;
            color: #fbbf24;
        }
        .btn-outline:hover { background: #fbbf24; color: #0a1f1a; }
        .ayah-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .ayah-item {
            background: #0a2a1f;
            border-radius: 16px;
            padding: 16px;
            border: 1px solid #255a40;
        }
        .ayah-text {
            font-family: 'Amiri', 'Traditional Arabic', serif;
            font-size: 1.6rem;
            line-height: 2.2;
            color: #f1f5f9;
            text-align: center;
            margin-bottom: 10px;
        }
        .ayah-audio {
            width: 100%;
            margin: 8px 0;
            accent-color: #22c55e;
            height: 36px;
        }
        .ayah-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .status-msg {
            text-align: center;
            margin: 12px 0;
            color: #86efac;
            font-weight: 600;
            min-height: 25px;
        }
        .note {
            font-size: 0.8rem;
            color: #9cb4a5;
            margin-top: 10px;
            text-align: center;
        }
        .progress-container {
            width: 100%;
            background: #1a3d30;
            border-radius: 10px;
            margin: 10px 0;
            height: 10px;
            overflow: hidden;
            display: none;
        }
        .progress-bar {
            width: 0%;
            height: 100%;
            background: #4ade80;
            transition: width 0.3s;
        }
        .disabled {
            opacity: 0.6;
            pointer-events: none;
        }
        .cancel-btn {
            background: #ef4444;
            color: white;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-quran"></i> آيات بينات</h1>
            <p style="color:#a7c5b8;">ادخل أرقام الآيات ثم حملها منفردة أو كلها في مقطع واحد</p>
        </div>

        <div class="search-panel">
            <div class="row">
                <div class="input-group">
                    <label><i class="fas fa-book"></i> رقم السورة</label>
                    <input type="number" id="surahNum" value="1" min="1" max="114">
                </div>
                <div class="input-group">
                    <label><i class="fas fa-list-ol"></i> أرقام الآيات</label>
                    <input type="text" id="ayahNumbers" value="1-3" placeholder="مثال: 1,3,5-7">
                </div>
                <div class="input-group">
                    <label><i class="fas fa-microphone"></i> القارئ</label>
                    <select id="reciter">
                        <option value="mohamed_laqzaf" selected>محمد لقظف (موريتانيا)</option>
                        <option value="alafasy">مشاري العفاسي</option>
                        <option value="abdulbasit">عبد الباسط عبد الصمد</option>
                        <option value="sudais">عبد الرحمن السديس</option>
                        <option value="ahmedajmi">أحمد العجمي</option>
                        <option value="hudhaify">علي الحذيفي</option>
                        <option value="maher">ماهر المعيقلي</option>
                        <option value="muhammadjibril">محمد جبريل</option>
                        <option value="yasser">ياسر الدوسري</option>
                    </select>
                </div>
            </div>
            <button class="btn" id="fetchBtn"><i class="fas fa-search"></i> جلب الآيات</button>
            <div class="note">
                <i class="fas fa-check-circle"></i> التحميل المنفرد يعمل دائمًا. الدمج يحتاج متصفح حديث.
            </div>
        </div>

        <div id="progressContainer" class="progress-container">
            <div id="progressBar" class="progress-bar"></div>
        </div>
        <div id="globalStatus" class="status-msg"></div>

        <div id="ayahContainer" class="ayah-list"></div>

        <div style="text-align:center; margin-top:20px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;">
            <button class="btn btn-gold" id="mergeDownloadBtn" style="display:none;">
                <i class="fas fa-file-audio"></i> دمج وتحميل الكل كمقطع WAV
            </button>
            <button class="btn cancel-btn" id="cancelBtn" style="display:none;">
                <i class="fas fa-times"></i> إلغاء الدمج
            </button>
        </div>
    </div>

    <script>
        (() => {
            const surahNum = document.getElementById('surahNum');
            const ayahNumbers = document.getElementById('ayahNumbers');
            const reciterSelect = document.getElementById('reciter');
            const fetchBtn = document.getElementById('fetchBtn');
            const container = document.getElementById('ayahContainer');
            const globalStatus = document.getElementById('globalStatus');
            const mergeDownloadBtn = document.getElementById('mergeDownloadBtn');
            const cancelBtn = document.getElementById('cancelBtn');
            const progressContainer = document.getElementById('progressContainer');
            const progressBar = document.getElementById('progressBar');

            let currentAyahs = [];
            let isCancelled = false;

            // قاعدة بيانات القُراء وروابطهم على everyayah.com
            const reciterPaths = {
                'mohamed_laqzaf': 'Mohamed_Laqzaf_128kbps',
                'alafasy': 'Alafasy_128kbps',
                'abdulbasit': 'AbdulBaset_Mujawwad_128kbps',
                'sudais': 'Abdurrahmaan_As-Sudais_128kbps',
                'ahmedajmi': 'Ahmed_Al-Ajamy_128kbps',
                'hudhaify': 'Hudhaify_128kbps',
                'maher': 'Maher_AlMuaiqly_128kbps',
                'muhammadjibril': 'Muhammad_Jibreel_128kbps',
                'yasser': 'Yasser_Ad-Dussary_128kbps'
            };

            function parseNumbers(str) {
                const nums = new Set();
                const parts = str.split(/[,،]+/);
                for (let part of parts) {
                    part = part.trim();
                    if (part.includes('-')) {
                        const [s, e] = part.split('-');
                        const start = parseInt(s);
                        const end = parseInt(e);
                        if (!isNaN(start) && !isNaN(end) && start <= end) {
                            for (let i = start; i <= end; i++) nums.add(i);
                        }
                    } else {
                        const n = parseInt(part);
                        if (!isNaN(n)) nums.add(n);
                    }
                }
                return Array.from(nums).sort((a,b) => a-b);
            }

            async function fetchSurahText(surah) {
                const url = `https://api.alquran.cloud/v1/surah/${surah}`;
                const res = await fetch(url);
                if (!res.ok) throw new Error('تعذر جلب نص السورة');
                const data = await res.json();
                if (data.code !== 200) throw new Error('بيانات غير صالحة');
                return data.data.ayahs;
            }

            function getAudioUrl(surah, ayah, reciterKey) {
                const paddedSurah = String(surah).padStart(3, '0');
                const paddedAyah = String(ayah).padStart(3, '0');
                return `https://www.everyayah.com/data/${reciterPaths[reciterKey]}/${paddedSurah}${paddedAyah}.mp3`;
            }

            function renderAyahs(ayahs) {
                container.innerHTML = '';
                currentAyahs = ayahs;
                if (ayahs.length === 0) {
                    container.innerHTML = '<p style="text-align:center;color:#fbbf24;">لا توجد آيات لعرضها.</p>';
                    mergeDownloadBtn.style.display = 'none';
                    return;
                }
                ayahs.forEach((ayah) => {
                    const div = document.createElement('div');
                    div.className = 'ayah-item';
                    div.innerHTML = `
                        <div class="ayah-text">﴿${ayah.text}﴾ <span style="font-size:0.8rem;color:#fbbf24;">[${ayah.number}]</span></div>
                        <audio class="ayah-audio" src="${ayah.audio}" controls preload="none"></audio>
                        <div class="ayah-actions">
                            <a class="btn btn-outline" href="${ayah.audio}" download="آية_${ayah.number}.mp3">
                                <i class="fas fa-download"></i> تحميل هذه الآية
                            </a>
                        </div>
                    `;
                    container.appendChild(div);
                });
                mergeDownloadBtn.style.display = 'inline-flex';
            }

            function cancelMerge() {
                isCancelled = true;
                globalStatus.textContent = 'تم إلغاء الدمج.';
                mergeDownloadBtn.classList.remove('disabled');
                cancelBtn.style.display = 'none';
                progressContainer.style.display = 'none';
            }

            cancelBtn.addEventListener('click', cancelMerge);

            async function mergeAndDownload() {
                if (currentAyahs.length === 0) return;
                
                isCancelled = false;
                mergeDownloadBtn.classList.add('disabled');
                cancelBtn.style.display = 'inline-flex';
                progressContainer.style.display = 'block';
                progressBar.style.width = '0%';
                globalStatus.textContent = 'جاري تحميل المقاطع الصوتية...';

                try {
                    const audioBuffers = [];
                    for (let i = 0; i < currentAyahs.length; i++) {
                        if (isCancelled) return;
                        const ayah = currentAyahs[i];
                        const response = await fetch(ayah.audio);
                        if (!response.ok) throw new Error(`تعذر تحميل الآية ${ayah.number}`);
                        const arrayBuffer = await response.arrayBuffer();
                        const audioCtx = new AudioContext();
                        const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
                        audioBuffers.push(audioBuffer);
                        audioCtx.close();
                        progressBar.style.width = `${((i + 1) / currentAyahs.length) * 40}%`;
                    }

                    if (isCancelled) return;
                    globalStatus.textContent = 'جاري دمج المقاطع...';
                    progressBar.style.width = '50%';

                    const sampleRate = 44100;
                    const totalLength = audioBuffers.reduce((sum, buf) => sum + Math.ceil(buf.duration * sampleRate), 0);
                    const offlineCtx = new OfflineAudioContext(2, totalLength, sampleRate);
                    
                    let offset = 0;
                    audioBuffers.forEach(buffer => {
                        const source = offlineCtx.createBufferSource();
                        source.buffer = buffer;
                        source.connect(offlineCtx.destination);
                        source.start(offset / sampleRate);
                        offset += Math.ceil(buffer.duration * sampleRate);
                    });

                    globalStatus.textContent = 'جاري المعالجة النهائية...';
                    progressBar.style.width = '80%';

                    const renderedBuffer = await offlineCtx.startRendering();
                    
                    if (isCancelled) return;
                    globalStatus.textContent = 'جاري التحميل...';
                    progressBar.style.width = '95%';

                    const wavBlob = bufferToWav(renderedBuffer);
                    const url = URL.createObjectURL(wavBlob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `آيات_سورة_${surahNum.value}_مدمجة.wav`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);

                    progressBar.style.width = '100%';
                    globalStatus.textContent = '✅ تم الدمج والتحميل بنجاح';
                } catch (err) {
                    console.error(err);
                    globalStatus.textContent = '❌ فشل الدمج: ' + err.message;
                } finally {
                    mergeDownloadBtn.classList.remove('disabled');
                    cancelBtn.style.display = 'none';
                    setTimeout(() => {
                        progressContainer.style.display = 'none';
                        progressBar.style.width = '0%';
                    }, 2000);
                }
            }

            function bufferToWav(buffer) {
                const numChannels = buffer.numberOfChannels;
                const sampleRate = buffer.sampleRate;
                const format = 1;
                const bitsPerSample = 16;
                const channelData = buffer.getChannelData(0);
                const dataLength = channelData.length * (bitsPerSample / 8);
                const headerLength = 44;
                const totalLength = headerLength + dataLength;
                
                const arrayBuffer = new ArrayBuffer(totalLength);
                const view = new DataView(arrayBuffer);
                
                function writeString(offset, string) {
                    for (let i = 0; i < string.length; i++) {
                        view.setUint8(offset + i, string.charCodeAt(i));
                    }
                }
                
                writeString(0, 'RIFF');
                view.setUint32(4, totalLength - 8, true);
                writeString(8, 'WAVE');
                writeString(12, 'fmt ');
                view.setUint32(16, 16, true);
                view.setUint16(20, format, true);
                view.setUint16(22, numChannels, true);
                view.setUint32(24, sampleRate, true);
                view.setUint32(28, sampleRate * numChannels * bitsPerSample / 8, true);
                view.setUint16(32, numChannels * bitsPerSample / 8, true);
                view.setUint16(34, bitsPerSample, true);
                writeString(36, 'data');
                view.setUint32(40, dataLength, true);
                
                let offset = 44;
                for (let i = 0; i < channelData.length; i++) {
                    let sample = Math.max(-1, Math.min(1, channelData[i]));
                    sample = sample < 0 ? sample * 0x8000 : sample * 0x7FFF;
                    view.setInt16(offset, sample, true);
                    offset += 2;
                }
                
                return new Blob([arrayBuffer], { type: 'audio/wav' });
            }

            fetchBtn.addEventListener('click', async () => {
                const surah = parseInt(surahNum.value);
                const reciterKey = reciterSelect.value;
                const numbers = parseNumbers(ayahNumbers.value);
                
                if (!surah || surah < 1 || surah > 114) {
                    alert('الرجاء إدخال رقم سورة صحيح بين 1 و 114.');
                    return;
                }
                if (numbers.length === 0) {
                    alert('الرجاء إدخال أرقام آيات صحيحة (مثال: 1,3,5-7).');
                    return;
                }

                globalStatus.textContent = 'جاري جلب الآيات...';
                container.innerHTML = '';
                mergeDownloadBtn.style.display = 'none';
                cancelBtn.style.display = 'none';

                try {
                    const allAyahs = await fetchSurahText(surah);
                    const selected = allAyahs.filter(a => numbers.includes(a.numberInSurah));
                    if (selected.length === 0) {
                        globalStatus.textContent = 'لم يتم العثور على الآيات المطلوبة.';
                        return;
                    }
                    const formatted = selected.map(a => ({
                        number: a.numberInSurah,
                        text: a.text,
                        audio: getAudioUrl(surah, a.numberInSurah, reciterKey)
                    }));
                    renderAyahs(formatted);
                    globalStatus.textContent = `تم جلب ${formatted.length} آيات. استمع أو حملها.`;
                } catch (err) {
                    globalStatus.textContent = 'خطأ: ' + err.message;
                }
            });

            mergeDownloadBtn.addEventListener('click', mergeAndDownload);

            window.addEventListener('load', () => {
                fetchBtn.click();
            });
        })();
    </script>
</body>
</html>
