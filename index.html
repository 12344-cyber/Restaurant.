<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محرر الصور المتحركة – منصة أغورط</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.12.6/dist/umd/ffmpeg.js">
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #021533;
            font-family: 'Cairo', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #e0e9f5;
            padding: 15px;
        }
        .app-container {
            max-width: 1350px;
            width: 100%;
            background: #0f1f33;
            border-radius: 32px;
            padding: 20px;
            box-shadow: 0 25px 55px rgba(0, 0, 0, 0.6);
            border: 1px solid #2a4060;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }
        .canvas-panel {
            flex: 2;
            min-width: 400px;
            background: #0b1a2a;
            border-radius: 24px;
            padding: 16px;
            border: 1px solid #2e4a6a;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .canvas-panel h2 {
            color: #00FF00;
            margin-bottom: 12px;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        #mainCanvas {
            width: 100%;
            max-width: 700px;
            height: auto;
            aspect-ratio: 1 / 1;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
            border: 2px solid #2a4060;
            background: black;
            cursor: pointer;
        }
        .record-controls {
            display: flex;
            gap: 12px;
            margin-top: 14px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn-record {
            background: #00FF00;
            color: #021533;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.25s;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Cairo', sans-serif;
        }
        .btn-record:hover {
            background: #00cc00;
            transform: scale(1.02);
            box-shadow: 0 6px 20px rgba(0, 255, 0, 0.3);
        }
        .btn-stop {
            background: #ff4757;
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.25s;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Cairo', sans-serif;
        }
        .btn-stop:hover {
            background: #e84118;
        }
        .btn-download {
            background: #2e7d32;
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.25s;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Cairo', sans-serif;
        }
        .btn-download:hover {
            background: #1b5e20;
        }
        .btn-download:disabled,
        .btn-stop:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .status-badge {
            background: rgba(0, 255, 0, 0.08);
            border: 1px solid #00FF0050;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            text-align: center;
            color: #00FF00;
            margin-top: 8px;
        }
        .status-badge.recording {
            background: rgba(255, 71, 87, 0.1);
            border-color: #ff475780;
            color: #ff4757;
            animation: pulse 1.2s infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        .control-panel {
            flex: 1;
            min-width: 300px;
            background: #0b1a2e;
            border-radius: 24px;
            padding: 18px;
            border: 1px solid #2e4a6a;
            max-height: 90vh;
            overflow-y: auto;
        }
        .control-panel h2 {
            color: #00FF00;
            font-size: 1.4rem;
            margin-bottom: 16px;
            border-bottom: 2px solid #00FF0040;
            padding-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .ctrl-group {
            margin-bottom: 14px;
        }
        .ctrl-group label {
            display: block;
            font-weight: 600;
            font-size: 0.85rem;
            color: #b8d0e8;
            margin-bottom: 5px;
        }
        .ctrl-group input,
        .ctrl-group select {
            width: 100%;
            padding: 10px 14px;
            border-radius: 12px;
            border: 1px solid #2e4a6a;
            background: #0b1a2a;
            color: #fff;
            font-size: 0.9rem;
            font-family: 'Cairo', sans-serif;
            transition: 0.2s;
            outline: none;
        }
        .ctrl-group input:focus,
        .ctrl-group select:focus {
            border-color: #00FF00;
            box-shadow: 0 0 0 3px rgba(0, 255, 0, 0.15);
        }
        .ctrl-group input[type="color"] {
            height: 42px;
            padding: 4px;
        }
        .ctrl-group input[type="file"] {
            padding: 6px;
            background: #0b1a2a;
        }
        .row2 {
            display: flex;
            gap: 10px;
        }
        .row2 .ctrl-group {
            flex: 1;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 10px 0;
        }
        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #00FF00;
        }
        .hint {
            color: #7a9bbf;
            font-size: 0.75rem;
            margin-top: 4px;
        }
        @media (max-width: 850px) {
            .app-container {
                flex-direction: column;
            }
            .canvas-panel {
                min-width: auto;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- لوحة الرسم والمعاينة -->
        <div class="canvas-panel">
            <h2><i class="fas fa-magic"></i> الصورة المتحركة</h2>
            <canvas id="mainCanvas" width="600" height="600"></canvas>
            <div class="record-controls">
                <button class="btn-record" id="btnStartRecord"><i class="fas fa-record-vinyl"></i> بدء التسجيل</button>
                <button class="btn-stop" id="btnStopRecord" disabled><i class="fas fa-stop-circle"></i> إيقاف</button>
            </div>
            <button class="btn-download" id="btnDownloadGIF" disabled><i class="fas fa-download"></i> تحميل GIF متحرك</button>
            <button class="btn-download" id="btnDownloadWebM" disabled style="margin-top:6px;"><i class="fas fa-download"></i> تحميل WebM</button>
            <div id="statusBadge" class="status-badge"><i class="fas fa-check-circle"></i> جاهز</div>
            <div class="hint"><i class="fas fa-info-circle"></i> اضغط بدء التسجيل لإنشاء صورة متحركة بتأثيرات ضوئية</div>
        </div>

        <!-- لوحة التحكم -->
        <div class="control-panel">
            <h2><i class="fas fa-sliders-h"></i> إعدادات التصميم</h2>

            <div class="ctrl-group">
                <label>✏️ النص</label>
                <input type="text" id="animText" value="الله" maxlength="25">
            </div>
            <div class="ctrl-group">
                <label>🔤 نوع الخط</label>
                <select id="fontFamily">
                    <option value="Cairo" selected>Cairo</option>
                    <option value="Arial">Arial</option>
                    <option value="Tahoma">Tahoma</option>
                    <option value="Traditional Arabic">Traditional Arabic</option>
                    <option value="Amiri">Amiri</option>
                </select>
            </div>
            <div class="row2">
                <div class="ctrl-group">
                    <label>📏 حجم الخط</label>
                    <input type="range" id="fontSize" value="80" min="30" max="150" step="1">
                    <span style="font-size:0.8rem;color:#7a9bbf;" id="fontSizeVal">80</span>
                </div>
                <div class="ctrl-group">
                    <label>🎨 لون النص</label>
                    <input type="color" id="textColor" value="#ffffff">
                </div>
            </div>
            <div class="row2">
                <div class="ctrl-group">
                    <label>✨ حجم التوهج</label>
                    <input type="range" id="glowSize" value="20" min="0" max="50" step="1">
                </div>
                <div class="ctrl-group">
                    <label>🌟 لون التوهج</label>
                    <input type="color" id="glowColor" value="#00FF00">
                </div>
            </div>

            <div class="ctrl-group">
                <label>🌀 نوع الحركة</label>
                <select id="motionType">
                    <option value="pulse" selected>نبض (تكبير/تصغير)</option>
                    <option value="wave">تموج أفقي</option>
                    <option value="rotate">دوران</option>
                    <option value="slide">انزلاق جانبي</option>
                    <option value="float">طيران رأسي</option>
                </select>
            </div>
            <div class="ctrl-group">
                <label>⚡ سرعة الحركة</label>
                <input type="range" id="motionSpeed" value="1.5" min="0.3" max="4" step="0.1">
                <span style="font-size:0.8rem;color:#7a9bbf;" id="speedVal">1.5</span>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="enableFireworks" checked>
                <label for="enableFireworks">🎆 تفعيل الألعاب النارية</label>
            </div>
            <div class="row2">
                <div class="ctrl-group">
                    <label>💥 كثافة الشرر</label>
                    <input type="range" id="sparkDensity" value="30" min="10" max="100" step="1">
                </div>
                <div class="ctrl-group">
                    <label>🎨 لون الشرر</label>
                    <input type="color" id="sparkColor" value="#FF4500">
                </div>
            </div>

            <div class="ctrl-group">
                <label>🖼️ نوع الخلفية</label>
                <select id="bgType">
                    <option value="gradient" selected>لون متدرج</option>
                    <option value="image">صورة</option>
                </select>
            </div>
            <div id="gradientColors" class="row2">
                <div class="ctrl-group">
                    <label>لون علوي</label>
                    <input type="color" id="bgColor1" value="#00261A">
                </div>
                <div class="ctrl-group">
                    <label>لون سفلي</label>
                    <input type="color" id="bgColor2" value="#0A3D2A">
                </div>
            </div>
            <div id="bgImageUpload" class="ctrl-group" style="display:none;">
                <label>رفع صورة الخلفية</label>
                <input type="file" id="bgImageFile" accept="image/*">
            </div>
        </div>
    </div>

    <script>
        (() => {
            // العناصر
            const canvas = document.getElementById('mainCanvas');
            const ctx = canvas.getContext('2d');

            // مدخلات التحكم
            const animTextInput = document.getElementById('animText');
            const fontFamilySelect = document.getElementById('fontFamily');
            const fontSizeSlider = document.getElementById('fontSize');
            const fontSizeVal = document.getElementById('fontSizeVal');
            const textColorInput = document.getElementById('textColor');
            const glowSizeSlider = document.getElementById('glowSize');
            const glowColorInput = document.getElementById('glowColor');
            const motionTypeSelect = document.getElementById('motionType');
            const motionSpeedSlider = document.getElementById('motionSpeed');
            const speedVal = document.getElementById('speedVal');
            const enableFireworksCheck = document.getElementById('enableFireworks');
            const sparkDensitySlider = document.getElementById('sparkDensity');
            const sparkColorInput = document.getElementById('sparkColor');
            const bgTypeSelect = document.getElementById('bgType');
            const gradientColorsDiv = document.getElementById('gradientColors');
            const bgImageUploadDiv = document.getElementById('bgImageUpload');
            const bgColor1Input = document.getElementById('bgColor1');
            const bgColor2Input = document.getElementById('bgColor2');
            const bgImageFileInput = document.getElementById('bgImageFile');

            // أزرار التسجيل والتحميل
            const btnStartRecord = document.getElementById('btnStartRecord');
            const btnStopRecord = document.getElementById('btnStopRecord');
            const btnDownloadGIF = document.getElementById('btnDownloadGIF');
            const btnDownloadWebM = document.getElementById('btnDownloadWebM');
            const statusBadge = document.getElementById('statusBadge');

            // متغيرات الحالة
            let bgImage = null;
            let isRecording = false;
            let mediaRecorder = null;
            let recordedChunks = [];
            let animationFrameId = null;
            let startTime = performance.now();
            let particles = [];
            const MAX_PARTICLES = 300;

            // تحديث عرض القيم
            fontSizeSlider.addEventListener('input', () => fontSizeVal.textContent = fontSizeSlider.value);
            motionSpeedSlider.addEventListener('input', () => speedVal.textContent = motionSpeedSlider.value);

            // تبديل نوع الخلفية
            bgTypeSelect.addEventListener('change', () => {
                if (bgTypeSelect.value === 'gradient') {
                    gradientColorsDiv.style.display = 'flex';
                    bgImageUploadDiv.style.display = 'none';
                } else {
                    gradientColorsDiv.style.display = 'none';
                    bgImageUploadDiv.style.display = 'block';
                }
            });

            // رفع صورة الخلفية
            bgImageFileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const img = new Image();
                    img.onload = () => {
                        bgImage = img;
                    };
                    img.src = ev.target.result;
                };
                reader.readAsDataURL(file);
            });

            // دالة رسم إطار واحد
            function drawFrame(timestamp) {
                const W = canvas.width;
                const H = canvas.height;
                ctx.clearRect(0, 0, W, H);

                // الخلفية
                if (bgTypeSelect.value === 'gradient') {
                    const grad = ctx.createLinearGradient(0, 0, 0, H);
                    grad.addColorStop(0, bgColor1Input.value);
                    grad.addColorStop(1, bgColor2Input.value);
                    ctx.fillStyle = grad;
                    ctx.fillRect(0, 0, W, H);
                } else if (bgImage) {
                    // رسم الصورة مع تغطية كاملة
                    const imgAspect = bgImage.width / bgImage.height;
                    const canvasAspect = W / H;
                    let dw, dh, dx, dy;
                    if (imgAspect > canvasAspect) {
                        dh = H;
                        dw = H * imgAspect;
                        dx = (W - dw) / 2;
                        dy = 0;
                    } else {
                        dw = W;
                        dh = W / imgAspect;
                        dx = 0;
                        dy = (H - dh) / 2;
                    }
                    ctx.drawImage(bgImage, dx, dy, dw, dh);
                } else {
                    // خلفية افتراضية
                    const grad = ctx.createLinearGradient(0, 0, 0, H);
                    grad.addColorStop(0, '#00261A');
                    grad.addColorStop(1, '#0A3D2A');
                    ctx.fillStyle = grad;
                    ctx.fillRect(0, 0, W, H);
                }

                // إعدادات النص
                const text = animTextInput.value.trim() || 'الله';
                const fontFamily = fontFamilySelect.value;
                const fontSize = parseInt(fontSizeSlider.value);
                const textColor = textColorInput.value;
                const glowSize = parseInt(glowSizeSlider.value);
                const glowColor = glowColorInput.value;
                const motionType = motionTypeSelect.value;
                const motionSpeed = parseFloat(motionSpeedSlider.value);
                const fireworksEnabled = enableFireworksCheck.checked;
                const sparkDensity = parseInt(sparkDensitySlider.value);
                const sparkColor = sparkColorInput.value;

                const elapsed = (timestamp - startTime) / 1000; // بالثواني

                // حساب تأثير الحركة
                let offsetX = 0,
                    offsetY = 0,
                    rotation = 0,
                    scale = 1.0;
                const speedFactor = motionSpeed;

                switch (motionType) {
                    case 'pulse':
                        scale = 1.0 + 0.15 * Math.sin(elapsed * 2 * Math.PI * speedFactor);
                        break;
                    case 'wave':
                        offsetX = 30 * Math.sin(elapsed * 3 * speedFactor);
                        break;
                    case 'rotate':
                        rotation = (elapsed * 20 * speedFactor) % 360;
                        break;
                    case 'slide':
                        offsetX = 80 * Math.sin(elapsed * 2 * speedFactor);
                        break;
                    case 'float':
                        offsetY = 25 * Math.sin(elapsed * 1.5 * speedFactor);
                        break;
                    default:
                        break;
                }

                // رسم النص
                ctx.save();
                ctx.translate(W / 2 + offsetX, H / 2 + offsetY);
                if (motionType === 'rotate') {
                    ctx.rotate(rotation * Math.PI / 180);
                }
                ctx.scale(scale, scale);
                ctx.font = `bold ${fontSize}px "${fontFamily}", "Cairo", sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';

                // رسم التوهج (عدة طبقات)
                if (glowSize > 0) {
                    ctx.shadowBlur = glowSize;
                    ctx.shadowColor = glowColor;
                    ctx.fillStyle = glowColor;
                    ctx.fillText(text, 0, 0);
                    // طبقات إضافية لتوهج أقوى
                    ctx.shadowBlur = glowSize * 1.8;
                    ctx.fillText(text, 0, 0);
                }
                // النص الأساسي
                ctx.shadowBlur = 0;
                ctx.fillStyle = textColor;
                ctx.fillText(text, 0, 0);
                ctx.restore();

                // جزيئات الألعاب النارية
                if (fireworksEnabled) {
                    // إضافة جزيئات جديدة بشكل عشوائي حول النص
                    const centerX = W / 2 + offsetX;
                    const centerY = H / 2 + offsetY;
                    const spawnRate = sparkDensity / 10; // عدد الجزيئات لكل إطار
                    for (let i = 0; i < spawnRate; i++) {
                        if (particles.length < MAX_PARTICLES) {
                            const angle = Math.random() * Math.PI * 2;
                            const speed = 0.5 + Math.random() * 4;
                            const life = 0.6 + Math.random() * 1.5; // ثواني
                            particles.push({
                                x: centerX + (Math.random() - 0.5) * 200,
                                y: centerY + (Math.random() - 0.5) * 100,
                                vx: Math.cos(angle) * speed * 60,
                                vy: Math.sin(angle) * speed * 60 - 30, // ميل للأعلى
                                life: life,
                                maxLife: life,
                                color: sparkColor,
                                size: 1.5 + Math.random() * 3.5
                            });
                        }
                    }

                    // تحديث ورسم الجزيئات
                    const dt = 1 / 60; // تقريباً
                    for (let i = particles.length - 1; i >= 0; i--) {
                        const p = particles[i];
                        p.life -= dt;
                        if (p.life <= 0) {
                            particles.splice(i, 1);
                            continue;
                        }
                        p.x += p.vx * dt;
                        p.y += p.vy * dt;
                        p.vy += 40 * dt; // جاذبية خفيفة

                        const alpha = p.life / p.maxLife;
                        ctx.save();
                        ctx.globalAlpha = alpha;
                        ctx.shadowBlur = 6;
                        ctx.shadowColor = p.color;
                        ctx.fillStyle = p.color;
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.restore();
                    }
                }

                // طلب الإطار التالي إذا لم يكن قيد التسجيل (للمعاينة المستمرة)
                if (!isRecording) {
                    animationFrameId = requestAnimationFrame(drawFrame);
                } else {
                    // أثناء التسجيل، نستمر بالرسم ولكن عبر حلقة التسجيل
                    animationFrameId = requestAnimationFrame(drawFrame);
                }
            }

            // بدء المعاينة
            function startPreview() {
                if (animationFrameId) cancelAnimationFrame(animationFrameId);
                startTime = performance.now();
                animationFrameId = requestAnimationFrame(drawFrame);
            }

            // إيقاف المعاينة (عند التسجيل نتركها)
            function stopPreview() {
                if (animationFrameId) {
                    cancelAnimationFrame(animationFrameId);
                    animationFrameId = null;
                }
            }

            // تحويل WebM إلى GIF باستخدام ffmpeg
            async function convertWebMToGIF(webmBlob) {
                const { FFmpeg } = FFmpegWASM;
                const ffmpeg = new FFmpeg();
                await ffmpeg.load();
                const inputBytes = new Uint8Array(await webmBlob.arrayBuffer());
                await ffmpeg.writeFile('input.webm', inputBytes);
                // تحويل إلى GIF: fps 12, حجم مناسب
                await ffmpeg.exec([
                    '-i', 'input.webm',
                    '-vf', 'fps=12,scale=500:-1:flags=lanczos,split[s0][s1];[s0]palettegen[p];[s1][p]paletteuse',
                    'output.gif'
                ]);
                const outputData = await ffmpeg.readFile('output.gif');
                return new Blob([outputData], { type: 'image/gif' });
            }

            // إعداد مسجل الوسائط
            function setupRecorder() {
                const stream = canvas.captureStream(24); // 24 إطار بالثانية
                const mime = MediaRecorder.isTypeSupported('video/webm;codecs=vp9') ?
                    'video/webm;codecs=vp9' : 'video/webm';
                mediaRecorder = new MediaRecorder(stream, { mimeType: mime });
                recordedChunks = [];
                mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) recordedChunks.push(e.data);
                };
                mediaRecorder.onstop = async () => {
                    const webmBlob = new Blob(recordedChunks, { type: mime });
                    // تمكين زر تحميل WebM
                    const webmUrl = URL.createObjectURL(webmBlob);
                    btnDownloadWebM.disabled = false;
                    btnDownloadWebM.onclick = () => {
                        const a = document.createElement('a');
                        a.href = webmUrl;
                        a.download = 'صورة_متحركة_' + Date.now() + '.webm';
                        a.click();
                    };

                    // محاولة تحويل إلى GIF
                    statusBadge.innerHTML = '<i class="fas fa-cog fa-spin"></i> جاري تحويل إلى GIF...';
                    statusBadge.className = 'status-badge';
                    try {
                        const gifBlob = await convertWebMToGIF(webmBlob);
                        const gifUrl = URL.createObjectURL(gifBlob);
                        btnDownloadGIF.disabled = false;
                        btnDownloadGIF.onclick = () => {
                            const a = document.createElement('a');
                            a.href = gifUrl;
                            a.download = 'صورة_متحركة_' + Date.now() + '.gif';
                            a.click();
                        };
                        statusBadge.innerHTML = '<i class="fas fa-check-circle"></i> الصورة المتحركة جاهزة (GIF + WebM)';
                        statusBadge.className = 'status-badge';
                    } catch (err) {
                        console.error('تعذر التحويل إلى GIF:', err);
                        statusBadge.innerHTML = '<i class="fas fa-exclamation-triangle"></i> تعذر إنشاء GIF. تم توفير WebM فقط.';
                        statusBadge.className = 'status-badge';
                    }
                };
                return mediaRecorder;
            }

            // بدء التسجيل
            function startRecording() {
                if (isRecording) return;
                const rec = setupRecorder();
                if (!rec) return;
                // إعادة ضبط وقت البداية للحصول على حركة متسقة
                startTime = performance.now();
                particles = []; // مسح الجزيئات السابقة
                rec.start();
                isRecording = true;
                btnStartRecord.disabled = true;
                btnStopRecord.disabled = false;
                btnDownloadGIF.disabled = true;
                btnDownloadWebM.disabled = true;
                statusBadge.innerHTML = '<i class="fas fa-circle"></i> جاري تسجيل الحركة...';
                statusBadge.className = 'status-badge recording';
                // التأكد من استمرار الرسم
                if (animationFrameId) cancelAnimationFrame(animationFrameId);
                animationFrameId = requestAnimationFrame(drawFrame);
            }

            // إيقاف التسجيل
            function stopRecording() {
                if (!isRecording) return;
                if (mediaRecorder && mediaRecorder.state === 'recording') {
                    mediaRecorder.stop();
                }
                isRecording = false;
                btnStartRecord.disabled = false;
                btnStopRecord.disabled = true;
                // نستمر بالمعاينة
                statusBadge.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> معالجة الملف...';
                statusBadge.className = 'status-badge';
                // لا نوقف الأنيميشن، بل نتركها للمعاينة
            }

            // أزرار التحكم
            btnStartRecord.addEventListener('click', startRecording);
            btnStopRecord.addEventListener('click', stopRecording);

            // أي تغيير في المدخلات يعيد تشغيل المعاينة إذا لم يكن قيد التسجيل
            const allInputs = [
                animTextInput, fontFamilySelect, fontSizeSlider, textColorInput,
                glowSizeSlider, glowColorInput, motionTypeSelect, motionSpeedSlider,
                enableFireworksCheck, sparkDensitySlider, sparkColorInput,
                bgTypeSelect, bgColor1Input, bgColor2Input, bgImageFileInput
            ];
            allInputs.forEach(inp => {
                inp.addEventListener('input', () => {
                    if (!isRecording) {
                        // إعادة تشغيل المعاينة لمشاهدة التغييرات فوراً
                        startPreview();
                    }
                });
                inp.addEventListener('change', () => {
                    if (!isRecording) {
                        startPreview();
                    }
                });
            });

            // بدء المعاينة الأولية
            startPreview();
        })();
    </script>
</body>
</html>
