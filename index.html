<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أغورط استوديو الصوت – توليد MP3 مباشر</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#021533; font-family:'Cairo',sans-serif; padding:20px; display:flex; justify-content:center; align-items:center; min-height:100vh; color:#e0e9f5; }
        .studio-wrapper { max-width:1100px; width:100%; background:#0f1f33; border-radius:40px; padding:30px; box-shadow:0 30px 60px rgba(0,0,0,0.7); border:1px solid #2a4060; display:flex; flex-direction:column; gap:30px; }
        .header { text-align:center; }
        .header h1 { font-size:2.5rem; font-weight:900; color:#00FF00; text-shadow:0 0 20px rgba(0,255,0,0.4); }
        .header p { color:#7a9bbf; margin-top:5px; }
        .main-grid { display:grid; grid-template-columns:1fr 1fr; gap:25px; }
        @media (max-width:800px){ .main-grid{grid-template-columns:1fr;} }
        .card { background:#0b1a2e; border-radius:30px; padding:25px; border:1px solid #2e4a6a; display:flex; flex-direction:column; gap:20px; }
        .card h2 { color:#00FF00; border-bottom:2px solid #00FF0030; padding-bottom:12px; }
        .upload-area { border:2px dashed #2a4060; border-radius:20px; padding:25px; text-align:center; cursor:pointer; background:#0a1a2a; }
        .upload-area:hover { border-color:#00FF00; background:#0a1f2f; }
        .upload-area i { font-size:3rem; color:#00FF0060; }
        .voice-badge { display:flex; align-items:center; gap:12px; background:#0a2a1a; border:1px solid #00FF0040; border-radius:20px; padding:12px; font-size:0.9rem; }
        .dot { width:14px; height:14px; border-radius:50%; background:#00FF00; animation:pulse 1.5s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
        textarea { width:100%; padding:16px; border-radius:16px; border:1px solid #2e4a6a; background:#0b1a2a; color:#fff; font-family:'Cairo'; resize:vertical; min-height:120px; outline:none; }
        textarea:focus { border-color:#00FF00; box-shadow:0 0 0 3px rgba(0,255,0,0.15); }
        .slider-group label { font-weight:600; color:#b8d0e8; display:flex; justify-content:space-between; }
        input[type="range"] { accent-color:#00FF00; }
        .btn-row { display:flex; gap:12px; flex-wrap:wrap; }
        .btn { flex:1; min-width:120px; padding:14px 20px; border:none; border-radius:40px; font-weight:700; cursor:pointer; transition:0.25s; display:flex; align-items:center; justify-content:center; gap:8px; font-family:'Cairo'; }
        .btn-primary { background:#00FF00; color:#021533; }
        .btn-primary:hover { background:#00cc00; }
        .btn-outline { background:transparent; border:2px solid #00FF00; color:#00FF00; }
        .btn-outline:hover { background:#00FF0010; }
        .btn-download { background:#2e7d32; color:white; }
        .btn-download:disabled { opacity:0.5; cursor:not-allowed; }
        .status-text { text-align:center; padding:10px; border-radius:20px; background:rgba(0,255,0,0.05); border:1px solid #00FF0030; color:#00FF00; }
        .status-text.processing { border-color:#ffa502; color:#ffa502; }
        .hidden-input { display:none; }
        .char-count { font-size:0.8rem; color:#7a9bbf; }
        .analysis-result { background:#0a1a2a; border-radius:16px; padding:15px; display:flex; flex-wrap:wrap; gap:15px; font-size:0.85rem; }
        .analysis-result span { background:#0f2a1f; padding:6px 14px; border-radius:20px; border:1px solid #00FF0030; }
    </style>
</head>
<body>
    <div class="studio-wrapper">
        <div class="header">
            <h1><i class="fas fa-waveform-lines"></i> استوديو أغورط الصوتي</h1>
            <p>ارفع فيديو لتحليل النبرة – توليد MP3 مباشر من النص دون أي تقاط</p>
        </div>

        <div class="main-grid">
            <!-- المرجع -->
            <div class="card">
                <h2><i class="fas fa-video"></i> تحليل المرجع</h2>
                <div class="upload-area" id="uploadVideoArea">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <p>ارفع ملف فيديو أو صوتي (MP4, MP3, WAV)</p>
                </div>
                <input type="file" id="refFileInput" accept="video/*,audio/*" class="hidden-input">
                <div id="refInfo" class="voice-badge" style="display:none;">
                    <div class="dot"></div>
                    <span id="refFileName">المرجع جاهز</span>
                </div>
                <div id="analysisResult" class="analysis-result" style="display:none;">
                    <span>🎵 النبرة (Hz): <b id="pitchValue">--</b></span>
                    <span>⏱️ السرعة التقريبية: <b id="rateValue">--</b> مقطع/ث</span>
                </div>
                <button class="btn btn-outline" id="btnAnalyze" disabled>
                    <i class="fas fa-search"></i> تحليل وضبط النبرة
                </button>
                <div id="refStatus" class="status-text">⏳ في انتظار ملف مرجعي</div>
            </div>

            <!-- التوليد -->
            <div class="card">
                <h2><i class="fas fa-pen-alt"></i> النص للتوليد</h2>
                <textarea id="textToSpeech" placeholder="أدخل الخبر أو النص ليتم تحويله إلى كلام..." maxlength="500"></textarea>
                <div class="char-count" id="charCount">0 / 500</div>

                <div class="slider-group">
                    <label>نسبة النبرة (مستوحاة من المرجع) <span id="pitchLabel">1.0</span></label>
                    <input type="range" id="pitchSlider" value="1.0" min="0.5" max="2.0" step="0.05">
                </div>
                <div class="slider-group">
                    <label>سرعة الإلقاء <span id="rateLabel">1.0</span></label>
                    <input type="range" id="rateSlider" value="1.0" min="0.5" max="2.0" step="0.05">
                </div>

                <div class="btn-row">
                    <button class="btn btn-primary" id="btnGenerate">
                        <i class="fas fa-microphone"></i> توليد MP3 مباشر
                    </button>
                </div>
                <div class="btn-row">
                    <button class="btn btn-download" id="btnDownload" disabled>
                        <i class="fas fa-download"></i> تحميل الملف الصوتي
                    </button>
                </div>
                <audio id="audioPreview" controls style="width:100%; margin-top:10px; display:none;"></audio>
                <div id="genStatus" class="status-text">⚡ جاهز – اضغط توليد لاستلام ملف MP3</div>
            </div>
        </div>
    </div>

    <script>
        (() => {
            const uploadArea = document.getElementById('uploadVideoArea');
            const refFileInput = document.getElementById('refFileInput');
            const refInfo = document.getElementById('refInfo');
            const refFileName = document.getElementById('refFileName');
            const analysisResult = document.getElementById('analysisResult');
            const pitchValue = document.getElementById('pitchValue');
            const rateValue = document.getElementById('rateValue');
            const btnAnalyze = document.getElementById('btnAnalyze');
            const refStatus = document.getElementById('refStatus');
            const textArea = document.getElementById('textToSpeech');
            const charCount = document.getElementById('charCount');
            const pitchSlider = document.getElementById('pitchSlider');
            const pitchLabel = document.getElementById('pitchLabel');
            const rateSlider = document.getElementById('rateSlider');
            const rateLabel = document.getElementById('rateLabel');
            const btnGenerate = document.getElementById('btnGenerate');
            const btnDownload = document.getElementById('btnDownload');
            const audioPreview = document.getElementById('audioPreview');
            const genStatus = document.getElementById('genStatus');

            let referenceFile = null;
            let audioContext = null;

            uploadArea.addEventListener('click', () => refFileInput.click());
            refFileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if(!file) return;
                referenceFile = file;
                refFileName.textContent = file.name;
                refInfo.style.display = 'flex';
                analysisResult.style.display = 'none';
                btnAnalyze.disabled = false;
                refStatus.innerHTML = '✅ تم رفع المرجع. اضغط تحليل.';
                refStatus.className = 'status-text';
            });

            btnAnalyze.addEventListener('click', async () => {
                if(!referenceFile) return;
                btnAnalyze.disabled = true;
                refStatus.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> جاري تحليل الصوت...';
                refStatus.className = 'status-text processing';
                try {
                    if(!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    const arrayBuffer = await referenceFile.arrayBuffer();
                    const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
                    const rawData = audioBuffer.getChannelData(0);
                    const sampleRate = audioBuffer.sampleRate;
                    const duration = audioBuffer.duration;

                    const pitchHz = estimatePitch(rawData, sampleRate);
                    const speechRate = estimateSpeechRate(rawData, sampleRate, duration);

                    const normalizedPitch = Math.max(0.7, Math.min(1.6, pitchHz / 150));
                    const normalizedRate = Math.max(0.7, Math.min(1.5, speechRate / 3.5));

                    pitchValue.textContent = Math.round(pitchHz);
                    rateValue.textContent = (speechRate * 60).toFixed(0);
                    analysisResult.style.display = 'flex';

                    pitchSlider.value = normalizedPitch.toFixed(2);
                    pitchLabel.textContent = normalizedPitch.toFixed(2);
                    rateSlider.value = normalizedRate.toFixed(2);
                    rateLabel.textContent = normalizedRate.toFixed(2);

                    refStatus.innerHTML = '🎯 تم تحليل النبرة والسرعة وضبط المنزلقات.';
                    refStatus.className = 'status-text';
                } catch(e) {
                    console.error(e);
                    refStatus.innerHTML = '❌ فشل التحليل. تأكد من الملف.';
                    refStatus.className = 'status-text';
                }
                btnAnalyze.disabled = false;
            });

            function estimatePitch(buffer, sampleRate) {
                const size = Math.min(buffer.length, sampleRate * 2);
                const data = buffer.slice(0, size);
                const maxLag = Math.floor(sampleRate / 80);
                const minLag = Math.floor(sampleRate / 400);
                let bestCorr = 0, bestLag = minLag;
                for(let lag = minLag; lag <= maxLag; lag++) {
                    let corr = 0;
                    for(let i = 0; i < size - lag; i++) corr += data[i] * data[i+lag];
                    if(corr > bestCorr) { bestCorr = corr; bestLag = lag; }
                }
                return bestCorr ? sampleRate / bestLag : 150;
            }

            function estimateSpeechRate(buffer, sampleRate, duration) {
                let crossings = 0;
                for(let i=1; i<buffer.length; i++) {
                    if((buffer[i] >= 0 && buffer[i-1] < 0) || (buffer[i] < 0 && buffer[i-1] >= 0)) crossings++;
                }
                return (crossings / duration) / 1000;
            }

            textArea.addEventListener('input', () => {
                charCount.textContent = `${textArea.value.length} / 500`;
            });

            pitchSlider.addEventListener('input', () => pitchLabel.textContent = parseFloat(pitchSlider.value).toFixed(2));
            rateSlider.addEventListener('input', () => rateLabel.textContent = parseFloat(rateSlider.value).toFixed(2));

            btnGenerate.addEventListener('click', async () => {
                const text = textArea.value.trim();
                if(!text) {
                    alert('اكتب النص أولاً');
                    return;
                }

                btnGenerate.disabled = true;
                btnDownload.disabled = true;
                audioPreview.style.display = 'none';
                genStatus.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> جاري توليد الصوت من Google TTS...';
                genStatus.className = 'status-text processing';

                try {
                    // استخدام Google Translate TTS (واجهة غير رسمية لكنها تعمل)
                    const url = `https://translate.google.com/translate_tts?ie=UTF-8&client=tw-ob&tl=ar&q=${encodeURIComponent(text)}`;
                    
                    const response = await fetch(url, {
                        method: 'GET',
                        headers: {
                            'User-Agent': 'Mozilla/5.0'
                        }
                    });

                    if(!response.ok) throw new Error('فشل الاتصال بـ Google TTS');

                    const blob = await response.blob();
                    
                    // إنشاء رابط للملف
                    const objectURL = URL.createObjectURL(blob);
                    audioPreview.src = objectURL;
                    audioPreview.style.display = 'block';
                    
                    // حفظ الملف للتحميل
                    btnDownload.disabled = false;
                    btnDownload.onclick = () => {
                        const a = document.createElement('a');
                        a.href = objectURL;
                        a.download = `أغورط_صوت_${Date.now()}.mp3`;
                        a.click();
                    };

                    genStatus.innerHTML = '✅ تم إنشاء الملف الصوتي بنجاح. اضغط تشغيل أو تحميل.';
                    genStatus.className = 'status-text';
                } catch (error) {
                    console.error(error);
                    genStatus.innerHTML = '❌ فشل توليد الصوت. قد يكون Google TTS محظوراً مؤقتاً. حاول مجدداً لاحقاً.';
                    genStatus.className = 'status-text';
                }
                
                btnGenerate.disabled = false;
            });

            // التحميل أيضاً عند الضغط على الزر المنفصل
            btnDownload.addEventListener('click', () => {
                if(audioPreview.src) {
                    const a = document.createElement('a');
                    a.href = audioPreview.src;
                    a.download = `أغورط_صوت_${Date.now()}.mp3`;
                    a.click();
                }
            });

        })();
    </script>
</body>
</html>
